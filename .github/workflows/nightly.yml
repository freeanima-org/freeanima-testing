name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  TESTER_IMAGE: ghcr.io/freeanima-org/freeanima-testing/tester:main
  FREEANIMA_SHA: main
  FREEANIMA_REPO: freeanima-org/freeanima

jobs:
  blackbox-main:
    name: Blackbox @ main
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: freeanima-org/freeanima
          ref: main
          path: freeanima

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run blackbox suite
        env:
          PG_PASSWORD: testing-blackbox
          OPENAI_API_KEY: sk-blackbox-ci-unused
          CI: "true"
        run: bash scripts/run-blackbox.sh

      - name: 写入失败摘要
        if: failure()
        run: |
          if [[ -f blackbox-debug/summary.md ]]; then
            cat blackbox-debug/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload blackbox debug bundle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: blackbox-debug-nightly
          path: blackbox-debug/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-nightly
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
