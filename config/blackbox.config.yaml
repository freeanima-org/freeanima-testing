# 黑盒测试用 config（Compose 内部网络：postgres / redis / anima）
# ${VAR} 由 loadConfig expandConfigEnv 展开

llm:
  default_profile: chat
  providers:
    main:
      backend: openai_compatible
      base_url: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      api_key: ${OPENAI_API_KEY:-sk-blackbox-unused}
  profiles:
    chat:
      chain:
        - provider: main
          model: ${OPENAI_MODEL:-gpt-4o-mini}
    reflect:
      chain:
        - provider: main
          model: ${OPENAI_MODEL:-gpt-4o-mini}
    summary:
      chain:
        - provider: main
          model: ${OPENAI_MODEL:-gpt-4o-mini}

database:
  url: postgresql://freeanima:${PG_PASSWORD:-testing-blackbox}@postgres:5432/freeanima

redis:
  host: redis
  port: 6379

compression:
  enabled: true
  max_rounds: 50

remote_auth:
  token: ${REMOTE_AUTH_TOKEN:-changeme-remote-auth-token}

web:
  enabled: true
