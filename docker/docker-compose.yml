# 黑盒全栈：PG + Redis + anima（源码挂载）+ tester（bun + Playwright）
# 服务间使用固定内部端口，默认不映射宿主机，避免本地端口冲突。
name: freeanima-blackbox

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: freeanima
      POSTGRES_USER: freeanima
      POSTGRES_PASSWORD: ${PG_PASSWORD:-testing-blackbox}
    volumes:
      - ./init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeanima -d freeanima"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10
      start_period: 2s

  anima:
    image: oven/bun:1.3.14
    working_dir: /app/freeanima
    volumes:
      - ${FREEANIMA_DIR:?set FREEANIMA_DIR to freeanima source}:/app/freeanima
      - anima_node_modules:/app/freeanima/node_modules
      - ../config/blackbox.config.yaml:/home/bun/.anima/config.yaml:ro
      - ./anima-entrypoint.sh:/anima-entrypoint.sh:ro
    environment:
      FREEANIMA_HOME: /home/bun/.anima
      PG_PASSWORD: ${PG_PASSWORD:-testing-blackbox}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-blackbox-unused}
      REMOTE_AUTH_TOKEN: ${REMOTE_AUTH_TOKEN:-changeme-remote-auth-token}
      FREEANIMA_URL: http://anima:2658
      ANIMA_PREBUILD_WEB: "1"
      ANIMA_WEBUI_DEV: "0"
    entrypoint: ["/bin/sh", "/anima-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "Promise.all([fetch(''http://127.0.0.1:2658/api/health''),fetch(''http://127.0.0.1:2659/health'')]).then(rs=>process.exit(rs.every(r=>r.ok)?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 3s
      timeout: 5s
      retries: 40
      start_period: 120s

  tester:
    image: ${TESTER_IMAGE:-freeanima-blackbox-tester:local}
    build:
      context: ..
      dockerfile: docker/Dockerfile.tester
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - tester_node_modules:/workspace/node_modules
    environment:
      ANIMA_BASE_URL: http://anima:2658
      ANIMA_WEB_BASE_URL: http://anima:2659
      CI: ${CI:-}
      GITHUB_ACTIONS: ${GITHUB_ACTIONS:-}
    depends_on:
      anima:
        condition: service_healthy
    profiles: ["test"]
    ipc: host
    init: true

volumes:
  anima_node_modules:
  tester_node_modules:
