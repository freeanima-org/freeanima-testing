# 黑盒测试基础设施：PostgreSQL + Redis（被测 freeanima 从源码启动，不走主仓 Dockerfile npm 包）
services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: freeanima
      POSTGRES_USER: freeanima
      POSTGRES_PASSWORD: ${PG_PASSWORD:-testing-blackbox}
    ports:
      - "${PG_HOST_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freeanima -d freeanima"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
