name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  blackbox-main:
    name: Blackbox @ main
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: freeanima-org/freeanima
          ref: main
          path: freeanima

      - uses: docker/setup-buildx-action@v3

      - name: Build tester image (GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.tester
          tags: freeanima-blackbox-tester:latest
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run blackbox suite
        env:
          PG_PASSWORD: testing-blackbox
          OPENAI_API_KEY: sk-blackbox-ci-unused
          CI: "true"
          SKIP_TESTER_BUILD: "1"
        run: bash scripts/run-blackbox.sh

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 7
