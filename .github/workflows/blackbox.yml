name: Blackbox

on:
  repository_dispatch:
    types: [pr-verify]
  workflow_dispatch:
    inputs:
      ref:
        description: freeanima git ref（分支、tag 或 SHA）
        required: false
        default: main
  pull_request:
    paths:
      - "blackbox/**"
      - "scripts/**"
      - "docker/**"
      - "config/**"
      - ".github/workflows/**"
      - "package.json"
      - "playwright.config.ts"

concurrency:
  group: blackbox-${{ github.event.client_payload.pr_number || github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  blackbox:
    name: Compose + Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout freeanima-testing
        uses: actions/checkout@v6

      - name: Checkout freeanima
        uses: actions/checkout@v6
        with:
          repository: freeanima-org/freeanima
          ref: ${{ github.event.client_payload.sha || github.event.inputs.ref || 'main' }}
          path: freeanima

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install testing dependencies
        run: bun install

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Run blackbox suite
        env:
          PG_PASSWORD: testing-blackbox
          PG_HOST_PORT: "15432"
          REDIS_HOST_PORT: "16379"
          OPENAI_API_KEY: sk-blackbox-ci-unused
          ANIMA_HEALTH_TIMEOUT_SEC: "420"
        run: bash scripts/run-blackbox.sh

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload anima service log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: anima-service-log
          path: .anima-service.log
          retention-days: 7

      - name: Report commit status to freeanima PR
        if: success() && github.event_name == 'repository_dispatch' && github.event.client_payload.sha != ''
        env:
          GH_TOKEN: ${{ secrets.MAIN_REPO_STATUS_PAT }}
          REPO: ${{ github.event.client_payload.repo_full_name }}
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/statuses/${SHA}" \
            -d "{\"state\":\"success\",\"context\":\"freeanima/blackbox\",\"description\":\"Blackbox passed\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Report failure status to freeanima PR
        if: failure() && github.event_name == 'repository_dispatch' && github.event.client_payload.sha != ''
        env:
          GH_TOKEN: ${{ secrets.MAIN_REPO_STATUS_PAT }}
          REPO: ${{ github.event.client_payload.repo_full_name }}
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/statuses/${SHA}" \
            -d "{\"state\":\"failure\",\"context\":\"freeanima/blackbox\",\"description\":\"Blackbox failed\",\"target_url\":\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
