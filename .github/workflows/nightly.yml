name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  TESTER_IMAGE: ghcr.io/freeanima-org/freeanima-testing/tester:main

jobs:
  blackbox-main:
    name: Blackbox @ main
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: freeanima-org/freeanima
          ref: main
          path: freeanima

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run blackbox suite
        env:
          PG_PASSWORD: testing-blackbox
          OPENAI_API_KEY: sk-blackbox-ci-unused
          CI: "true"
        run: bash scripts/run-blackbox.sh

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nightly
          path: playwright-report/
          retention-days: 7
